    post:
      operationId: exportProjectPdf
      tags: [projects]
      summary: Export project report as PDF
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Project not found
        "501":
          description: PDF export not configured

  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List materials library
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"

  /materials/prices/refresh:
    post:
      operationId: refreshMaterialPrices
