          description: ID of an existing Drive folder. Either rootFolderId OR createName is required.
        rootFolderName:
          type: string
          description: Optional display name for the chosen folder. The server resolves it from Drive when omitted.
        createName:
          type: string
          description: When supplied (and no rootFolderId), the server creates a new folder of this name under My Drive.
        visibilityPolicy:
          type: string
          enum: [private, anyone_with_link]
        deletePolicy:
          type: string
          enum: [trash, hard_delete]

