          oneOf:
            - { type: string }
            - { type: "null" }
        rootFolderName:
          oneOf:
            - { type: string }
            - { type: "null" }
        visibilityPolicy:
          type: string
          enum: [private, anyone_with_link]
        deletePolicy:
          type: string
          enum: [trash, hard_delete]
        connectedAt:
          oneOf:
            - { type: string }
            - { type: "null" }
