      summary: Refresh material prices using Perplexity AI
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Updated prices for materials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialPriceRefreshResponse"
        "501":
          description: Perplexity not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Perplexity API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /estimating/materials/import:
    post:
      operationId: importMaterialsCsv
      tags: [estimating]
      summary: Import a CSV of materials into the library (with optional column mapping)
      description: |
        Accepts raw CSV text plus an optional column mapping. When the
        mapping is supplied, source-CSV headers are renamed to canonical
        fields (item, category, unit, base_price, ...) before parsing.
        Returns counts and per-row reasons for any rows that were
        skipped because they did not pass validation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialsImportResponse"
        "400":
          description: All rows invalid (or malformed CSV) — body still includes skippedDetails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportErrorResponse"

  /estimating/labor-rates/import:
    post:
      operationId: importLaborRatesCsv
      tags: [estimating]
      summary: Import a CSV of labor rates (with optional column mapping)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsvImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportResponse"
        "400":
          description: All rows invalid (or malformed CSV)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvImportErrorResponse"

  /projects/{id}/csv-mappings:
    get:
      operationId: getProjectCsvMappings
      tags: [estimating]
      summary: Get the remembered CSV column mappings for a project
      description: |
        Returns the stored per-import-kind column mappings (materials,
        labor, receipts) that were last confirmed when importing CSVs
        on the calculator imports tab. Used to preselect the mapping
        the next time the same project imports a CSV.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stored mappings (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCsvMappings"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/csv-mappings/{kind}:
    put:
      operationId: putProjectCsvMapping
      tags: [estimating]
      summary: Persist a CSV column mapping for a project + import kind
      description: |
        Stores the user-confirmed mapping from canonical schema field to
        source-CSV header. Values are header strings (or null when the
        field is intentionally unmapped).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [materials, labor, receipts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutCsvMappingRequest"
      responses:
        "200":
          description: Mapping saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutCsvMappingResponse"
        "400":
          description: Invalid kind or mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

