          type: string
        projectId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [pdf, excel, pptx, photo, other]
        category:
          type: string
          enum: [client_review, internal, permits, construction, design, contratos, acuerdos_compra, otros]
        designSubPhase:
          type: string
          enum: [schematic_design, design_development, construction_documents]
          description: Optional Phase-3 sub-phase tag (SD/DD/CD).
        photoCategory:
          type: string
          enum: [site_conditions, construction_progress, punchlist_evidence, final]
          description: Site-photo bucket. Only meaningful when `type` is "photo"; controls grouping in the project gallery and report.
        caption:
          type: string
          description: Optional caption shown under the photo in the gallery and report.
        imageUrl:
          type: string
          description: Optional URL the gallery uses to render a thumbnail/full-size image. When omitted, the gallery shows a generic photo tile.
        isClientVisible:
          type: boolean
        featuredAsCover:
          type: boolean
          description: When true, this photo is the staff-curated "hero" used as the project's `liveCoverImage`. Only applies to `type === "photo"` + `photoCategory === "construction_progress"` documents. At most one document per project may be flagged at a time — toggling one on flips the previously flagged photo off (server-enforced).
        uploadedBy:
          type: string
        uploadedAt:
          type: string
        fileSize:
          type: string
        description:
          type: string
        previewable:
          type: boolean
        driveFileId:
          type: string
          description: Google Drive file ID set when the document was synced to Drive (Task #128). Absent for in-memory-only documents.
        driveFolderId:
          type: string
          description: Google Drive folder the file was placed in (project sub-folder).
        driveWebViewLink:
          type: string
          description: Drive viewer URL — clickable in the dashboard to open the file in Google Drive.
        driveWebContentLink:
          type: string
          description: Direct download URL provided by Drive. Used by the photo lightbox to render the original.
        driveThumbnailLink:
          type: string
          description: Drive-generated thumbnail URL (small preview).
        driveDownloadProxyUrl:
          type: string
          description: Dashboard-mediated download URL (Task #128). Re-checks role + visibility on every request so revoking client visibility instantly cuts off file access.
        driveWarning:
          type: object
          description: Optional non-blocking warning surfaced when a Drive write (delete/visibility) succeeded locally but failed on Drive. The dashboard should display it and direct admins to the Drive sync log.
          properties:
            en: { type: string }
            es: { type: string }
        versions:
          type: array
          items:
            $ref: "#/components/schemas/DocumentVersion"
      required:
        - id
        - projectId
        - name
        - type
        - category
        - isClientVisible
        - uploadedBy
        - uploadedAt
        - fileSize

    DocumentCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: File name including extension (1-200 chars).
        category:
          type: string
          enum: [client_review, internal, permits, construction, design, contratos, acuerdos_compra, otros]
          description: Document category. Must match the Document.category enum.
        type:
          type: string
          enum: [pdf, excel, pptx, photo, other]
          description: Optional file-type bucket. If omitted, the server infers it from the file extension and normalizes to one of [pdf|excel|pptx|photo|other].
        isClientVisible:
          type: boolean
          description: When true the document appears in the client-visible list. Defaults to true.
        fileSize:
          type: string
          description: Human-readable file size (e.g. "1.4 MB"). Optional.
        description:
          type: string
          description: Optional free-form description.
        mimeType:
          type: string
          description: Optional MIME type captured at upload time.
        photoCategory:
          type: string
          enum: [site_conditions, construction_progress, punchlist_evidence, final]
          description: Required when uploading a photo; chooses which gallery section the image lands in.
        caption:
          type: string
          maxLength: 500
          description: Optional photo caption (max 500 chars).
        imageUrl:
          type: string
          description: Optional URL for the photo thumbnail/full-size image.
        fileBase64:
          type: string
          description: Optional base64-encoded payload (raw or `data:` URL). When the Drive integration is enabled, the bytes are streamed to the project's Drive sub-folder and the response includes driveFileId/driveWebViewLink. Ignored when Drive is disabled.
      required:
        - name
        - category

    DocumentUpdateRequest:
      type: object
      description: Patch the safe, mutable metadata of a document. At least one of `isClientVisible`, `featuredAsCover`, or `caption` must be present.
      properties:
        isClientVisible:
          type: boolean
          description: Toggle whether the document is visible in the client-facing document list. Team-only.
        featuredAsCover:
          type: boolean
          description: Toggle whether this construction-progress photo is the staff-curated cover. Setting to `true` flips any other photo on the same project off so only one cover is flagged at a time. Only valid for documents with `type === "photo"` and `photoCategory === "construction_progress"`. Team-only.
        caption:
          type: string
          maxLength: 500
          description: Update the photo caption (max 500 chars). Allowed for team/admin/superadmin OR the original uploader (so clients can edit captions on photos they uploaded themselves).

    DocumentVersionCreateRequest:
      type: object
      description: |
        Append a new version entry to an existing document. Team-only.
        This endpoint records version METADATA (size, uploader, timestamp,
        notes) — file content storage in this demo is handled out of band
        (the Drive integration sync layer in production; static seed
        images in dev), matching every other document upload path in the
        dashboard.
      properties:
        fileSize:
          type: string
          description: Human-readable file size of the new version (e.g. "1.4 MB").
        notes:
          type: string
          maxLength: 500
          description: Optional English notes about what changed in this version.
        notesEs:
          type: string
          maxLength: 500
          description: Optional Spanish notes about what changed in this version.

