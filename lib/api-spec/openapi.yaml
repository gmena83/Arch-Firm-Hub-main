  # ---------------------------------------------------------------------------
  # Task #130 — Superadmin Integrations tab (managed secrets + restart + audit)
  # ---------------------------------------------------------------------------
  /admin/secrets:
    get:
      operationId: listManagedSecrets
      tags: [admin-secrets]
      summary: List the configured managed-secret rows (no raw values)
      responses:
        "200":
          description: Managed secret rows with masked previews
          content:
            application/json:
              schema:
                type: object
                properties:
                  secrets:
                    type: array
                    items: { $ref: "#/components/schemas/ManagedSecretStatus" }
                required: [secrets]

  /admin/secrets/{name}:
    post:
      operationId: updateManagedSecret
      tags: [admin-secrets]
      summary: Set or clear an override for a managed secret
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value: { type: string, description: New secret value (write-only) }
                clear: { type: boolean, description: When true, removes any override and reverts to env }
      responses:
        "200":
          description: Updated row (no raw value)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { $ref: "#/components/schemas/ManagedSecretStatus" }
                required: [status]

  /admin/secrets/{name}/test:
    post:
      operationId: testManagedSecret
      tags: [admin-secrets]
      summary: |
        Probe the live API with a key value.

        Body is optional:
          - omit (or pass `{}`) to test the currently stored value
          - pass `{ "value": "candidate" }` to test a transient pasted
            candidate WITHOUT persisting it (powers the modal "Test
            before Save" flow)
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  description: Optional candidate value to probe instead of the stored value. Never persisted.
      responses:
        "200":
          description: Test result (ok flag + safe message)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecretTestResult" }

  /admin/integrations/restart/{name}:
    post:
      operationId: restartIntegration
      tags: [admin-secrets]
      summary: Force-refresh OAuth tokens and run a health probe (drive | asana)
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Restart result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecretTestResult" }

  /admin/audit-log:
    get:
      operationId: listSuperadminAudit
      tags: [admin-secrets]
      summary: Last 50 superadmin-triggered actions
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/SuperadminAuditEntry" }
                required: [entries]

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    CsvColumnMapping:
      type: object
      description: |
        Maps each canonical schema field name to either the source-CSV
        header that should fill it, or null when intentionally unmapped.
      additionalProperties:
        type: string
        nullable: true
      example:
        item: Producto
        category: Categoria
        unit: Unidad
        base_price: Costo

    ProjectCsvMappings:
      type: object
      properties:
        projectId:
          type: string
        mappings:
          type: object
          properties:
            materials:
              $ref: "#/components/schemas/CsvColumnMapping"
            labor:
              $ref: "#/components/schemas/CsvColumnMapping"
            receipts:
              $ref: "#/components/schemas/CsvColumnMapping"
      required:
        - projectId
        - mappings

    PutCsvMappingRequest:
      type: object
      properties:
        mapping:
          $ref: "#/components/schemas/CsvColumnMapping"
      required:
        - mapping

    CsvSkippedRow:
      type: object
      properties:
        row:
          type: integer
          description: 1-based source CSV row number (header is row 1).
        reason:
          type: string
          description: Short English reason code (e.g. "missing item/category/unit/price").
      required:
        - row
        - reason

    CsvImportRequest:
      type: object
      properties:
        csv:
          type: string
          description: Raw CSV text.
        mapping:
          allOf:
            - $ref: "#/components/schemas/CsvColumnMapping"
          nullable: true
          description: Optional canonical-field -> source-header rename map.
      required:
        - csv

    CsvImportResponse:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        skippedDetails:
          type: array
          items:
            $ref: "#/components/schemas/CsvSkippedRow"
      required:
        - imported
        - skipped

    MaterialsImportResponse:
      allOf:
        - $ref: "#/components/schemas/CsvImportResponse"
        - type: object
          properties:
            addedToProjectCalculator:
              type: integer
              description: Number of lines pushed onto the project's calculator (0 unless projectId was supplied in the request).

    CsvImportErrorResponse:
      type: object
      properties:
        message:
          type: string
        messageEs:
          type: string
        skipped:
          type: integer
        skippedDetails:
          type: array
          items:
            $ref: "#/components/schemas/CsvSkippedRow"
      required:
        - message

    PutCsvMappingResponse:
      type: object
      properties:
        projectId:
          type: string
        kind:
          type: string
          enum: [materials, labor, receipts]
        mapping:
          $ref: "#/components/schemas/CsvColumnMapping"
