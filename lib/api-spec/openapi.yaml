          type: object
          description: Present only on the first successful connect. Reports the result of the per-project sub-folder provisioning + initial backfill that the server runs once.
          properties:
            provisioned: { type: integer, description: Number of projects whose canonical sub-folders were ensured. }
            provisionFailed: { type: integer, description: Number of projects where provisioning failed. }
            uploaded: { type: integer, description: Documents uploaded to Drive by the initial backfill. }
            skipped: { type: integer, description: Documents skipped (already in Drive or no source bytes). }
            failed: { type: integer, description: Documents the backfill could not upload. }
