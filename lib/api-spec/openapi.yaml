        category:
          type: string
          description: Optional grouping category (English) used to render sticky section headers in the punchlist panel.
        categoryEs:
          type: string
          description: Optional Spanish translation of `category`.
        photoUrl:
          type: string
          description: Optional thumbnail URL (data URL, seed-image path, or http(s)) shown alongside the item. Rendered as a clickable thumbnail that opens the full image in a new tab; items without a `photoUrl` show a neutral placeholder so the layout stays uniform.
        photoDocumentId:
          type: string
          description: Optional id of a project document whose stored URL should be resolved client-side and shown as the thumbnail. Reserved for the document-backed punchlist evidence path; when present and `photoUrl` is unset, the dashboard resolves the URL via the project's documents list.
      required: [id, projectId, phase, label, labelEs, owner, status, updatedAt]

    PunchlistResponse:
      type: object
      properties:
        projectId: { type: string }
        phase: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/PunchlistItem" }
        openCount: { type: integer }
        totalCount: { type: integer }
        doneCount: { type: integer }
        waivedCount: { type: integer }
      required: [projectId, phase, items, openCount, totalCount, doneCount, waivedCount]

    PunchlistItemMutationResponse:
      type: object
      properties:
        projectId: { type: string }
        item: { $ref: "#/components/schemas/PunchlistItem" }
      required: [projectId, item]

    CreatePunchlistItemRequest:
      type: object
      properties:
        label:
          type: string
          description: English label (truncated to 200 chars server-side)
        labelEs:
          type: string
          description: Spanish label (truncated to 200 chars server-side)
        owner:
          type: string
          description: Person or subcontractor responsible (truncated to 100 chars)
        dueDate:
          type: string
          description: Optional ISO date (YYYY-MM-DD)
        phase:
          type: string
          description: Phase to attach the item to. Defaults to the project's current phase.
      required: [label, labelEs, owner]

    UpdatePunchlistItemRequest:
      type: object
      description: Partial update; only provided fields are written.
      properties:
        label: { type: string }
        labelEs: { type: string }
        owner: { type: string }
        dueDate:
          type: string
          description: ISO date (YYYY-MM-DD); pass empty string to clear

    UpdatePunchlistStatusRequest:
      type: object
      properties:
        status: { $ref: "#/components/schemas/PunchlistItemStatus" }
        waiverReason:
          type: string
          description: Required (≥3 chars) when status is `waived`. Ignored otherwise.
      required: [status]

    PunchlistOpenError:
      type: object
      description: |
        Returned by `POST /projects/{projectId}/advance-phase` with HTTP 400
        when the current phase still has unresolved punchlist items.
      properties:
        error:
          type: string
          enum: [punchlist_open]
        message:
          type: string
          description: Human-readable reason in English
        messageEs:
          type: string
          description: Human-readable reason in Spanish
        openCount: { type: integer }
        openItems:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              label: { type: string }
              labelEs: { type: string }
              status: { $ref: "#/components/schemas/PunchlistItemStatus" }
            required: [id, label, labelEs, status]
      required: [error, message, messageEs, openCount, openItems]

    ManagedSecretCategory:
      type: string
      enum: [ai, pdf, presentation, oauth]

    ManagedSecretMeta:
      type: object
      properties:
        name: { type: string }
        label: { type: string }
        labelEs: { type: string }
        description: { type: string }
        descriptionEs: { type: string }
        category: { $ref: "#/components/schemas/ManagedSecretCategory" }
        testable: { type: boolean }
        formatHint: { type: string, nullable: true }
      required: [name, label, labelEs, description, descriptionEs, category, testable]

    ManagedSecretSource:
      type: string
      enum: [override, env, missing]

    ManagedSecretStatus:
      type: object
      properties:
        meta: { $ref: "#/components/schemas/ManagedSecretMeta" }
        source: { $ref: "#/components/schemas/ManagedSecretSource" }
        preview: { type: string, description: "Last-4 masked preview, e.g. …1234" }
        overrideUpdatedAt: { type: string, nullable: true }
        overrideUpdatedBy: { type: string, nullable: true }
      required: [meta, source, preview, overrideUpdatedAt, overrideUpdatedBy]

    SecretTestResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
        messageEs: { type: string, nullable: true }
      required: [ok, message]

    SuperadminAuditAction:
      type: string
      enum:
        - secret.update
        - secret.test
        - secret.test_failed
        - secret.test_candidate
        - secret.test_candidate_failed
        - integration.restart
        - integration.restart_failed

    SuperadminAuditEntry:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string }
        actorUserId: { type: string }
        actorEmail: { type: string }
        action: { $ref: "#/components/schemas/SuperadminAuditAction" }
        target: { type: string }
        message: { type: string }
        messageEs: { type: string }
      required: [id, timestamp, actorUserId, actorEmail, action, target, message, messageEs]

    ContractorEstimateLine:
      type: object
      description: |
        Single line on a contractor estimate. Materials and subcontractor
        lines always price as `quantity × unitPrice`. Labor lines carry an
        optional `laborType` discriminator (Task #158 / B-02): `hourly`
        lines also price as `quantity × unitPrice`; `lump` lines are fixed
        price — the server normalises them to `quantity = 1` and
        `unit = "lump"` on PUT so the variance report's amount-delta math
        treats `lineTotal` as the lump sum.
      properties:
        id: { type: string }
        category:
          type: string
          description: Bucket the line rolls up into. Typically `materials`, `labor`, or `subcontractor`.
        description: { type: string }
        descriptionEs: { type: string }
        quantity: { type: number }
        unit: { type: string }
        unitPrice: { type: number }
        lineTotal: { type: number }
        laborType:
          type: string
          enum: [hourly, lump]
          description: Only meaningful when `category === "labor"`. `lump` lines are normalised to `quantity=1`, `unit="lump"`.
      required: [id, category, description, descriptionEs, quantity, unit, unitPrice, lineTotal]

    VarianceBucketStatus:
      type: string
      enum: [on_track, warning, over]
      description: |
        Traffic-light state for a variance bucket. `on_track` = within ±5%
        of estimate, `warning` = ±5–15%, `over` = > +15%.

    VarianceBucket:
      type: object
      description: |
        Per-bucket rollup for the variance panel. The four buckets are
        Materials, Labor, Subcontractor, and Unassigned (invoices that
        were billed but don't fit M/L/S — design-phase, closeout, etc).
      properties:
        key:
          type: string
          description: Canonical bucket key (`materials`, `labor`, `subcontractor`, `unassigned`).
        labelEn: { type: string }
        labelEs: { type: string }
        estimated:
          type: number
          description: Estimated cost from the contractor estimate or calculator entries.
        invoiced:
          type: number
          description: Total billed to the client for this bucket.
        actual:
          type: number
          description: Cost-plus actual spend recorded against this bucket.
        variance:
          type: number
          description: actual − estimated. Positive = over budget.
        variancePercent:
          type: number
          nullable: true
          description: |
            (actual − estimated) ÷ estimated × 100, rounded to int. Returns
            `null` when estimated=0 and actual≠0 so the UI can render "—"
            instead of a misleading "0%".
        varianceVsInvoiced:
          type: number
          description: actual − invoiced. The headline signal — "did we spend more than we billed?"
        varianceVsInvoicedPercent:
          type: number
          nullable: true
          description: Same null-on-zero-base contract as `variancePercent`.
        status: { $ref: "#/components/schemas/VarianceBucketStatus" }
      required:
        - key
        - labelEn
        - labelEs
        - estimated
        - invoiced
        - actual
        - variance
        - variancePercent
        - varianceVsInvoiced
        - varianceVsInvoicedPercent
        - status

    VarianceMaterialCategory:
      type: object
      description: Per-material-category rollup inside the Materials bucket.
      properties:
        category: { type: string }
        estimated: { type: number }
        invoiced: { type: number }
        actual: { type: number }
        variance: { type: number }
        variancePercent:
          type: number
          nullable: true
        varianceVsInvoiced: { type: number }
        varianceVsInvoicedPercent:
          type: number
          nullable: true
      required:
        - category
        - estimated
        - invoiced
        - actual
        - variance
        - variancePercent
        - varianceVsInvoiced
        - varianceVsInvoicedPercent

    VarianceTotals:
      type: object
      description: |
        Whole-project totals used by the totals strip on the variance panel.
        `invoiced` is the everything-billed number (in-plan + unassigned);
        `invoicedInPlan` is the matched-scope base used by
        `varianceVsInvoiced` so the headline delta compares apples-to-apples.
      properties:
        estimated: { type: number }
        actual: { type: number }
        invoiced:
          type: number
          description: All invoices billed to the client (in-plan + unassigned).
        invoicedInPlan:
          type: number
          description: M/L/S invoices only — the matched-scope base for `varianceVsInvoiced`.
        invoicedUnassigned:
          type: number
          description: Invoices that didn't fit M/L/S (design, closeout, overhead).
        variance: { type: number }
        variancePercent:
          type: number
          nullable: true
        varianceVsInvoiced:
          type: number
          description: actual − invoicedInPlan. Excludes unassigned so scopes match.
        varianceVsInvoicedPercent:
          type: number
          nullable: true
      required:
        - estimated
        - actual
        - invoiced
        - invoicedInPlan
        - invoicedUnassigned
        - variance
        - variancePercent
        - varianceVsInvoiced
        - varianceVsInvoicedPercent

    VarianceReport:
      type: object
      description: |
        Estimated vs Invoiced vs Actual rollup for the calculator's variance
        tab. Returned by `GET /api/projects/:projectId/variance-report`.
      properties:
        projectId: { type: string }
        projectName: { type: string }
        estimateSource:
          type: string
          enum: [contractor_estimate, calculator_entries]
          description: Which input drove the Estimated column.
        generatedAt:
          type: string
          format: date-time
        buckets:
          type: array
          items: { $ref: "#/components/schemas/VarianceBucket" }
        materialCategories:
          type: array
          items: { $ref: "#/components/schemas/VarianceMaterialCategory" }
        totals: { $ref: "#/components/schemas/VarianceTotals" }
      required:
        - projectId
        - projectName
        - estimateSource
        - generatedAt
        - buckets
        - materialCategories
        - totals
